baseURL = "https://TrogdorTheMan.github.io/"
locale = "en-us"
title = "Cory | IT Consultant & Developer"
theme = "PaperMod"

[pagination]
  pagerSize = 10

[params.assets]
  favicon = "favicon-32x32.png"
  favicon16x16 = "favicon-16x16.png"
  favicon32x32 = "favicon-32x32.png"

[params]
  author = "Cory"
  description = "IT consultant writing about PowerShell, Azure, SharePoint/M365, GitHub Actions, and whatever else breaks in interesting ways."
  email = "me@corymf.com"
  heroImage = "https://github.com/TrogdorTheMan.png"
  heroSkills = ["PowerShell", ".NET", "Azure", "SharePoint / M365", "GitHub Actions", "CI/CD"]
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false
  ShowToc = true
  TocOpen = false
  disableScrollToTop = false
  comments = false

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/TrogdorTheMan"

[[params.socialIcons]]
  name = "email"
  url = "mailto:me@corymf.com"

[menu]
  [[menu.main]]
    name = "Projects"
    url = "/projects/"
    weight = 10
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 20
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 30

[taxonomies]
  tag = "tags"
  category = "categories"

[markup.highlight]
  noClasses = false
