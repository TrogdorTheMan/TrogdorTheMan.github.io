baseURL = "https://corymf.com/"
locale = "en-us"
title = "Cory Francis | Engineering Leader & Builder"
theme = "PaperMod"

[pagination]
  pagerSize = 10

[params.assets]
  favicon = "favicon-32x32.png"
  favicon16x16 = "favicon-16x16.png"
  favicon32x32 = "favicon-32x32.png"

[params]
  author = "Cory Francis"
  description = "Engineering leader and independent consultant in Seattle. A decade of infrastructure, cloud, and SRE leadership, now back to hands-on building and open source."
  email = "me@corymf.com"
  heroImage = "/images/cory-francis.jpg"
  images = ["/images/cory-francis.jpg"]
  heroSkills = ["AWS", "Azure", "Terraform", "Kubernetes", "PowerShell", "Python", "Node.js", "GitHub Actions", "SharePoint / M365"]
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false
  ShowToc = true
  TocOpen = false
  disableScrollToTop = false
  comments = false

[[params.heroStats]]
  value = "9+ yrs"
  label = "leading infrastructure, cloud, and SRE teams"

[[params.heroStats]]
  value = "100+"
  label = "microservices migrated out of a legacy monolith"

[[params.heroStats]]
  value = "100/wk"
  label = "production deploys, up from once every two weeks"

[[params.heroStats]]
  value = "$250K/mo"
  label = "cloud budget owned and optimized"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/TrogdorTheMan"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/cfzb"

[[params.socialIcons]]
  name = "email"
  url = "mailto:me@corymf.com"

[menu]
  [[menu.main]]
    name = "Projects"
    url = "/projects/"
    weight = 10
  [[menu.main]]
    name = "Resume"
    url = "/resume/"
    weight = 15
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 20
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 30

[taxonomies]
  tag = "tags"
  category = "categories"

[markup.highlight]
  noClasses = false

# Keep newlines intact inside XML text nodes; the LinkedIn feed needs them
# for paragraph breaks in the share text.
[minify]
  disableXML = true

# Dedicated feed at /posts/linkedin.xml containing only posts with
# shareLinkedIn: true — this is the feed the Zapier → LinkedIn Zap watches.
[outputFormats.linkedin]
  mediaType = "application/rss+xml"
  baseName = "linkedin"
  rel = "alternate"
